[NEAT]
fitness_criterion      = max
fitness_threshold      = 1000
pop_size               = 150
reset_on_extinction    = False
no_fitness_termination = True

[DefaultGenome]
single_structural_mutation = False
structural_mutation_surer  = default

num_inputs              = 8
num_outputs             = 4
# ДАЕМ 4 СКРЫТЫХ НЕЙРОНА ПРИ РОЖДЕНИИ (Базовый интеллект)
num_hidden              = 10
initial_connection      = full_direct
feed_forward            = True

activation_default      = tanh
activation_mutate_rate  = 0
activation_options      = tanh

aggregation_default     = sum
aggregation_mutate_rate = 0.0
aggregation_options     = sum

bias_init_type          = gaussian
bias_init_mean          = 0.0
bias_init_stdev         = 1.0
bias_max_value          = 30.0
bias_min_value          = -30.0
# Уменьшили силу мутации смещения
bias_mutate_power       = 0.2   
bias_mutate_rate        = 0.7
# Уменьшили шанс полной замены
bias_replace_rate       = 0.05  

weight_init_type        = gaussian
weight_init_mean        = 0.0
weight_init_stdev       = 1.0
weight_max_value        = 30.0
weight_min_value        = -30.0
# Уменьшили силу мутации (теперь они точнее подбирают веса)
weight_mutate_power     = 0.2   
weight_mutate_rate      = 0.8
# Реже полностью забывают старый опыт
weight_replace_rate     = 0.05  

response_init_type      = gaussian
response_init_mean      = 1.0
response_init_stdev     = 0.0
response_max_value      = 30.0
response_min_value      = -30.0
response_mutate_power   = 0.0
response_mutate_rate    = 0.0
response_replace_rate   = 0.0

enabled_default         = True
# Реже отключают связи
enabled_mutate_rate     = 0.01  
enabled_rate_to_true_add = 0.0
enabled_rate_to_false_add = 0.0

# ИСПРАВЛЕНИЕ ЛОБОТОМИИ:
# Чаще добавляют извилины
conn_add_prob           = 0.3 
# ПОЧТИ ПЕРЕСТАЮТ ИХ УДАЛЯТЬ  
conn_delete_prob        = 0.05
node_add_prob           = 0.1
# Почти перестают удалять нейроны
node_delete_prob        = 0.01  

compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient   = 0.5


[DefaultSpeciesSet]
compatibility_threshold = 10.0

[DefaultStagnation]
species_fitness_func = max
# Даем видам больше времени на развитие, задача сложная
max_stagnation       = 30
species_elitism      = 3

[DefaultReproduction]
elitism            = 2
survival_threshold = 0.2
min_species_size   = 1
